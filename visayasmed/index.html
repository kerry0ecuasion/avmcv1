<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/VMlogo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisayasMed Hospital — Trusted Care Across Generations</title>
  <meta name="description"
    content="VisayasMed Hospital delivers compassionate, patient-centered healthcare since 1955. Expert medical professionals, modern facilities, and 24/7 emergency services in Cebu, Philippines." />
  <meta name="theme-color" content="#0891b2" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link
    href="https://cdn.jsdelivr.net/npm/@qpokychuk/gilroy@1.0.2/index.css"
    rel="stylesheet">
  <script>
    // Initialize theme before React loads to prevent flash
    (function () {
      const theme = localStorage.getItem('theme');
      const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      const root = document.documentElement;
      if (isDark) {
        root.classList.add('dark');
        root.style.colorScheme = 'dark';
      } else {
        root.classList.remove('dark');
        root.style.colorScheme = 'light';
      }
    })();
  </script>
  <style>
    /* ─── Loading Screen ─── */
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .dark #app-loader {
      background: #0a0f1a;
    }

    #app-loader.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Logo */
    #app-loader .loader-logo {
      width: 90px;
      height: 90px;
      animation: loaderPulse 1.6s ease-in-out infinite;
    }

    /* Spinner ring */
    #app-loader .loader-ring {
      width: 110px;
      height: 110px;
      position: absolute;
      border: 3px solid transparent;
      border-top-color: #2B5597;
      border-radius: 50%;
      animation: loaderSpin 1s linear infinite;
    }

    .dark #app-loader .loader-ring {
      border-top-color: #5b8fd4;
    }

    #app-loader .loader-ring-inner {
      width: 100px;
      height: 100px;
      position: absolute;
      border: 2px solid transparent;
      border-bottom-color: #e63946;
      border-radius: 50%;
      animation: loaderSpin 1.4s linear infinite reverse;
    }

    /* Text */
    #app-loader .loader-text {
      margin-top: 32px;
      font-family: 'Gilroy', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #2B5597;
      text-transform: uppercase;
    }

    .dark #app-loader .loader-text {
      color: #7ea2d1;
    }

    #app-loader .loader-sub {
      margin-top: 6px;
      font-family: 'Gilroy', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }

    .dark #app-loader .loader-sub {
      color: #64748b;
    }

    /* Progress bar */
    #app-loader .loader-bar-track {
      margin-top: 24px;
      width: 180px;
      height: 3px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .dark #app-loader .loader-bar-track {
      background: #1e293b;
    }

    #app-loader .loader-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2B5597, #e63946);
      border-radius: 99px;
      animation: loaderProgress 1.2s ease-out forwards;
    }

    @keyframes loaderSpin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes loaderPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.05);
        opacity: 0.85;
      }
    }

    @keyframes loaderProgress {
      0% {
        width: 0%;
      }

      40% {
        width: 60%;
      }

      80% {
        width: 85%;
      }

      100% {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- Loading screen — renders instantly, no JS needed -->
  <div id="app-loader">
    <div style="position: relative; display: flex; align-items: center; justify-content: center;">
      <div class="loader-ring"></div>
      <div class="loader-ring-inner"></div>
      <img src="/VMlogo.png" alt="VisayasMed" class="loader-logo" />
    </div>
    <div class="loader-text">VisayasMed Hospital</div>
    <div class="loader-sub">Loading your experience...</div>
    <div class="loader-bar-track">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
